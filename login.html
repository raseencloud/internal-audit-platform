<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام المراجعة الداخلية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a237e;
            --secondary: #0d47a1;
            --accent: #00bcd4;
            --light: #f5f7fa;
            --glass: rgba(255,255,255,0.15);
        }
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, #006064 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo-circle {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--accent), #00838f);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(0,188,212,0.3);
        }
        .logo-circle i { font-size: 2rem; color: white; }
        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
            padding: 0.8rem 1rem;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.15);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 0 3px rgba(0,188,212,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .form-label { color: rgba(255,255,255,0.8); font-weight: 500; }
        .input-group-text {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-left: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
        }
        .btn-login {
            background: linear-gradient(135deg, var(--accent), #00838f);
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,188,212,0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0,188,212,0.4);
        }
        .text-white-50 { color: rgba(255,255,255,0.5) !important; }
        .alert {
            background: rgba(220,53,69,0.2);
            border: 1px solid rgba(220,53,69,0.3);
            color: #ffcdd2;
            border-radius: 12px;
        }
        h3 { color: white; font-weight: 700; }
        .forgot-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .forgot-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="login-card">
        <div class="logo-circle">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h3 class="text-center mb-1">نظام المراجعة الداخلية</h3>
        <p class="text-white-50 text-center mb-4">تسجيل الدخول إلى لوحة التحكم</p>
        
        <div id="errorAlert" class="alert alert-danger d-none mb-3" role="alert">
            <i class="fas fa-circle-exclamation me-2"></i>
            <span id="errorText">اسم المستخدم أو كلمة المرور غير صحيحة</span>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <div class="input-group">
                    <span class="input-group-text rounded-end-0"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control rounded-start-0" id="username" placeholder="أدخل اسم المستخدم" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">كلمة المرور</label>
                <div class="input-group">
                    <span class="input-group-text rounded-end-0"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control rounded-start-0" id="password" placeholder="أدخل كلمة المرور" required>
                    <span class="input-group-text" id="togglePassword" style="cursor:pointer;">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login">
                <i class="fas fa-arrow-right-to-bracket me-2"></i> تسجيل الدخول
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Generate particles
        const particlesContainer = document.getElementById('particles');
        for(let i=0; i<50; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random()*100 + '%';
            p.style.animationDelay = Math.random()*15 + 's';
            p.style.animationDuration = (10+Math.random()*10) + 's';
            particlesContainer.appendChild(p);
        }

        // Toggle password
        document.getElementById('togglePassword').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('i');
            if(input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Login handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const alert = document.getElementById('errorAlert');
            const btn = document.querySelector('.btn-login');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> جاري التحقق...';
            btn.disabled = true;

            setTimeout(() => {
                if(user === 'admin' && pass === 'admin123') {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', user);
                    window.location.href = 'dashboard.html';
                } else {
                    alert.classList.remove('d-none');
                    btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket me-2"></i> تسجيل الدخول';
                    btn.disabled = false;
                }
            }, 1000);
        });
    </script>
</body>
</html>
